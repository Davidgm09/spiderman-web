      <circle cx="100" cy="100" r="100" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
      
      <!-- Radial lines -->
      <line x1="100" y1="0" x2="100" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
