      <!-- Concentric circles -->
      <circle cx="100" cy="100" r="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <circle cx="100" cy="100" r="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
