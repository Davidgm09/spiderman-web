      <line x1="50" y1="13.4" x2="150" y2="186.6" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <line x1="150" y1="13.4" x2="50" y2="186.6" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <line x1="13.4" y1="50" x2="186.6" y2="150" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <line x1="186.6" y1="50" x2="13.4" y2="150" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="200" height="200" fill="url(#spiderWeb)"/>
