<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="marvelGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ed1d24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="600" fill="url(#heroGradient)"/>
  
  <!-- Spider web pattern -->
  <g opacity="0.1">
    <circle cx="200" cy="300" r="50" fill="none" stroke="white" stroke-width="1"/>
    <circle cx="200" cy="300" r="100" fill="none" stroke="white" stroke-width="1"/>
    <circle cx="200" cy="300" r="150" fill="none" stroke="white" stroke-width="1"/>
    <line x1="200" y1="150" x2="200" y2="450" stroke="white" stroke-width="1"/>
    <line x1="50" y1="300" x2="350" y2="300" stroke="white" stroke-width="1"/>
    <line x1="94" y1="194" x2="306" y2="406" stroke="white" stroke-width="1"/>
    <line x1="306" y1="194" x2="94" y2="406" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Marvel logo placeholder -->
  <rect x="150" y="250" width="100" height="40" rx="5" fill="url(#marvelGradient)"/>
  <text x="200" y="275" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="16">MARVEL</text>
  
  <!-- Character placeholder icon -->
  <circle cx="200" cy="180" r="30" fill="rgba(255,255,255,0.2)"/>
  <circle cx="200" cy="170" r="12" fill="rgba(255,255,255,0.3)"/>
  <path d="M 170 200 Q 200 220 230 200 L 225 210 Q 200 225 175 210 Z" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Text -->
  <text x="200" y="350" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="14">Personaje Marvel</text>
  <text x="200" y="370" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif" font-size="12">Imagen no disponible</text>
</svg> 